name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from package.json to publish, without a leading v
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workflow input
        shell: bash
        run: |
          if [ -z "${VERSION}" ]; then
            echo "Version input is required."
            exit 1
          fi

          if [ "${VERSION#v}" != "${VERSION}" ]; then
            echo "Enter the version without a leading v. Received: ${VERSION}"
            exit 1
          fi

      - name: Validate release branch
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "Publish must run from ${DEFAULT_BRANCH}, got ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Validate package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "${PACKAGE_VERSION}" != "${VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match workflow input ${VERSION}."
            exit 1
          fi

      - name: Validate release tag is new
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists on origin."
            exit 1
          fi

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Run build
        run: bun run build

      - name: Create release tag
        run: git tag "v${VERSION}"

      - name: Push release tag
        run: git push origin "refs/tags/v${VERSION}"

      - name: Create GitHub Release
        run: gh release create "v${VERSION}" --verify-tag --generate-notes --title "v${VERSION}"

      - name: Publish package to npm
        run: npm publish --provenance --access public
